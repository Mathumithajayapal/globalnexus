<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Page Not Found</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      color: #1E1B2E;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 20px;
    }

    h1 {
      font-size: 120px;
      font-weight: 800;
      color: #7C3AED;
      line-height: 1;
    }

    h2 {
      font-size: 26px;
      margin-top: 10px;
      font-weight: 700;
    }

    p {
      margin-top: 12px;
      font-size: 15px;
      color: #6b7280;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 28px;
      background: #7C3AED;
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn:hover {
      background: #6d28d9;
    }

    /* Optional small icon style */
    .icon {
      font-size: 40px;
      margin-bottom: 10px;
      color: #7C3AED;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="icon">⚠️</div>

    <h1>404</h1>

    <h2>Page Not Found</h2>

    <p>
      The page you are looking for doesn’t exist or has been moved.
    </p>

    <a href="index.html" class="btn">
      Go Back Home
    </a>
  </div>

</body>
</html>
