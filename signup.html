    <script src="tailwind.js"></script><link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', sans-serif;
    transition: background 0.25s ease, color 0.2s ease;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
  }

  /* LIGHT MODE */
  body:not(.dark-mode) {
    background: linear-gradient(125deg, #f9f5ff 0%, #ede9fe 100%);
  }

  body:not(.dark-mode) .card-container {
    background-color: #ffffff;
    box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.15);
  }

  body:not(.dark-mode) input {
    background-color: #ffffff !important;
    border: 1px solid #e2e8f0 !important;
    color: #0f172a !important;
  }

  body:not(.dark-mode) input::placeholder {
    color: #6c757d !important;
  }

  body:not(.dark-mode) input:focus {
    border-color: #7c3aed !important;
    box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
  }

  body:not(.dark-mode) label {
    color: #1e293b !important;
    font-weight: 600;
  }

  body:not(.dark-mode) .social-google,
  body:not(.dark-mode) .social-linkedin {
    background-color: #ffffff;
    border-color: #cbd5e1;
    color: #0f172a;
  }

  body:not(.dark-mode) .social-google:hover,
  body:not(.dark-mode) .social-linkedin:hover {
    background-color: #f8fafc;
    border-color: #a78bfa;
  }

  /* DARK MODE */
  body.dark-mode {
    background: linear-gradient(135deg, #0b1120 0%, #1a1a2e 100%);
  }

  body.dark-mode .card-container {
    background-color: #1f2a3e !important;
    box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
  }

  body.dark-mode input {
    background-color: #2d3a4e !important;
    border: 1px solid #40536b !important;
    color: #f1f5f9 !important;
  }

  body.dark-mode input::placeholder {
    color: #9aaebf !important;
  }

  body.dark-mode input:focus {
    border-color: #a78bfa !important;
    box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.25);
  }

  body.dark-mode label {
    color: #e2e8f0 !important;
  }

  body.dark-mode .social-google,
  body.dark-mode .social-linkedin {
    background-color: #2d3a4e;
    border-color: #546e7a;
    color: #f1f5f9;
  }

  body.dark-mode .social-google:hover,
  body.dark-mode .social-linkedin:hover {
    background-color: #3b4b62;
    border-color: #c084fc;
  }

  /* Card styling - optimized to fit without scroll on desktop */
  .card-container {
    transition: background-color 0.25s ease, box-shadow 0.2s;
    max-width: 500px;
    width: 100%;
    border-radius: 2rem;
    margin: 0 auto;
    overflow: visible;
  }

  .rtl-flip {
    transform: scaleX(-1);
    display: inline-block;
  }

  button, input {
    font-family: 'Inter', sans-serif;
  }

  button:focus-visible,
  input:focus-visible {
    outline: 2px solid #7c3aed;
    outline-offset: 2px;
  }

  .submit-arrow {
    transition: transform 0.1s ease;
  }

  .terms-label {
    line-height: 1.4;
  }

  /* FIXED TOGGLE BUTTONS OUTSIDE CARD */
  .fixed-toggles {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 1000;
    display: flex;
    gap: 12px;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(12px);
    padding: 8px 14px;
    border-radius: 60px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
    border: 1px solid rgba(124, 58, 237, 0.3);
    transition: all 0.2s ease;
  }
  
  body.dark-mode .fixed-toggles {
    background: rgba(25, 30, 45, 0.95);
    border-color: rgba(167, 139, 250, 0.4);
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
  }
  
  .toggle-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
    background: rgba(255, 255, 255, 0.98);
    border: none;
    font-size: 1rem;
    font-weight: 600;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
  }
  
  body.dark-mode .toggle-btn {
    background: rgba(55, 65, 85, 0.98);
    color: #f1f5f9;
  }
  
  .toggle-btn:hover {
    background: #7c3aed;
    color: white;
    transform: scale(1.05);
  }
  
  body.rtl .fixed-toggles {
    right: auto;
    left: 20px;
  }
  
  /* SIGN UP BUTTON - HIGHLY VISIBLE */
  #submitBtn {
    min-height: 52px;
    background: #7c3aed;
    color: white;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.3px;
    border: none;
    cursor: pointer;
  }
  
  #submitBtn:hover {
    background: #6d28d9;
    transform: translateY(-1px);
  }
  
  .btn-content {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    white-space: nowrap;
  }
  
  /* Optimized spacing - no scroll needed on desktop */
  input {
    width: 100%;
    font-size: 15px !important;
    padding: 12px 16px !important;
    border-radius: 12px !important;
  }
  
  label {
    margin-bottom: 6px;
    font-size: 0.85rem;
  }
  
  /* ===== DESKTOP OPTIMIZATION - NO SCROLL ===== */
  @media (min-width: 1024px) {
    body {
      padding: 20px;
    }
    
    .card-container {
      max-width: 480px;
    }
    
    .card-container > div {
      padding: 1.75rem !important;
    }
    
    .space-y-6 > * + * {
      margin-top: 1rem;
    }
    
    .mb-8 {
      margin-bottom: 1.25rem;
    }
    
    .my-8 {
      margin-top: 1.25rem;
      margin-bottom: 1.25rem;
    }
    
    .mt-8 {
      margin-top: 1rem;
    }
    
    .mt-6 {
      margin-top: 1rem;
    }
    
    .py-4 {
      padding-top: 0.875rem;
      padding-bottom: 0.875rem;
    }
    
    h2.text-2xl {
      font-size: 1.5rem !important;
    }
    
    .text-sm {
      font-size: 0.8rem;
    }
  }
  
  /* ===== RESPONSIVE ADJUSTMENTS FOR MOBILE ===== */
  @media (max-width: 768px) {
    body {
      padding: 70px 16px 20px 16px;
    }
    
    .card-container {
      max-width: 100%;
    }
    
    .card-container > div {
      padding: 1.25rem !important;
    }
    
    .fixed-toggles {
      top: 12px;
      right: 12px;
      padding: 6px 10px;
      gap: 8px;
    }
    
    body.rtl .fixed-toggles {
      right: auto;
      left: 12px;
    }
    
    .toggle-btn {
      width: 36px;
      height: 36px;
    }
    
    #submitBtn {
      min-height: 48px;
      font-size: 0.9rem;
    }
    
    h2.text-2xl {
      font-size: 1.35rem !important;
    }
    
    input {
      padding: 10px 14px !important;
    }
  }
  
  @media (max-width: 480px) {
    body {
      padding: 68px 12px 16px 12px;
    }
    
    .card-container > div {
      padding: 1rem !important;
    }
    
    .fixed-toggles {
      top: 10px;
      right: 10px;
      padding: 5px 8px;
    }
    
    .toggle-btn {
      width: 34px;
      height: 34px;
      font-size: 0.85rem;
    }
    
    .social-google, .social-linkedin {
      padding: 8px 10px !important;
      font-size: 0.75rem !important;
    }
    
    .btn-content {
      white-space: normal;
      text-align: center;
    }
    
    #submitBtn {
      min-height: 46px;
      font-size: 0.85rem;
    }
    
    .space-y-6 > * + * {
      margin-top: 0.875rem;
    }
  }
  
  @media (max-width: 360px) {
    body {
      padding: 64px 10px 16px 10px;
    }
    
    .grid-cols-2 {
      gap: 8px;
    }
    
    #submitBtn {
      min-height: 44px;
      font-size: 0.8rem;
    }
  }
  
  @media (max-width: 340px) {
    .grid-cols-2 {
      grid-template-columns: 1fr;
      gap: 8px;
    }
    
    .social-google, .social-linkedin {
      justify-content: center;
    }
  }
  
  /* Landscape mode */
  @media (max-height: 700px) and (orientation: landscape) {
    body {
      padding: 50px 20px 20px 20px;
    }
    
    .card-container {
      max-height: calc(100vh - 70px);
      overflow-y: auto;
    }
    
    .card-container::-webkit-scrollbar {
      width: 4px;
    }
    
    .card-container::-webkit-scrollbar-track {
      background: #e2e8f0;
      border-radius: 4px;
    }
    
    body.dark-mode .card-container::-webkit-scrollbar-track {
      background: #2d3a4e;
    }
    
    .card-container::-webkit-scrollbar-thumb {
      background: #7c3aed;
      border-radius: 4px;
    }
  }
  
  /* Ensure text contrast */
  .text-gray-600, .text-gray-700, .text-gray-800 {
    color: #1e293b !important;
  }
  
  body.dark-mode .text-gray-600,
  body.dark-mode .text-gray-700,
  body.dark-mode .text-gray-800 {
    color: #e2e8f0 !important;
  }
  
</style>
</head>

  <script>
    (function() {
      // Dark Mode Logic
      const darkModeToggle = document.getElementById('darkModeToggle');
      const body = document.body;
      const htmlElement = document.documentElement;

      const savedDark = localStorage.getItem('darkMode');
      if (savedDark === 'true') {
        body.classList.add('dark-mode');
        updateDarkIcon(true);
      } else {
        body.classList.remove('dark-mode');
        updateDarkIcon(false);
      }

      function updateDarkIcon(isDark) {
        const iconSvg = document.getElementById('darkModeIcon');
        if (isDark) {
          iconSvg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />';
        } else {
          iconSvg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />';
        }
      }

      darkModeToggle.addEventListener('click', () => {
        const isDarkNow = body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', isDarkNow);
        updateDarkIcon(isDarkNow);
      });

      // RTL / LTR Toggle
      const rtlToggleBtn = document.getElementById('rtlToggle');
      const rtlIconSpan = document.getElementById('rtlIconText');
      
      function applyDirection(dir) {
        if (dir === 'rtl') {
          htmlElement.setAttribute('dir', 'rtl');
          body.classList.add('rtl');
          rtlIconSpan.innerText = 'RTL';
          localStorage.setItem('dirMode', 'rtl');
          const arrowSpan = document.querySelector('.submit-arrow');
          if (arrowSpan) arrowSpan.classList.add('rtl-flip');
        } else {
          htmlElement.setAttribute('dir', 'ltr');
          body.classList.remove('rtl');
          rtlIconSpan.innerText = 'LTR';
          localStorage.setItem('dirMode', 'ltr');
          const arrowSpan = document.querySelector('.submit-arrow');
          if (arrowSpan) arrowSpan.classList.remove('rtl-flip');
        }
      }
      
      const savedDir = localStorage.getItem('dirMode');
      if (savedDir === 'rtl') applyDirection('rtl');
      else applyDirection('ltr');
      
      rtlToggleBtn.addEventListener('click', () => {
        const currentDir = htmlElement.getAttribute('dir');
        const newDir = currentDir === 'rtl' ? 'ltr' : 'rtl';
        applyDirection(newDir);
      });
      
      // Form Validation
      const form = document.getElementById('signupForm');
      const submitBtn = document.getElementById('submitBtn');
      const fullnameInput = document.getElementById('fullname');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const confirmInput = document.getElementById('confirm_password');
      const termsCheckbox = document.getElementById('termsCheckbox');
      
      const originalBtnHTML = submitBtn.innerHTML;
      const originalBtnBg = submitBtn.style.background;
      
      function showBtnMessage(message, isError = true) {
        if (isError) {
          submitBtn.innerHTML = `<span class="btn-content">⚠️ ${message}</span>`;
          submitBtn.style.background = '#dc2626';
        } else {
          submitBtn.innerHTML = `<span class="btn-content">✓ ${message}</span>`;
          submitBtn.style.background = '#16a34a';
        }
        setTimeout(() => {
          submitBtn.innerHTML = originalBtnHTML;
          submitBtn.style.background = '#7c3aed';
        }, 2400);
      }
      
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const fullname = fullnameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const confirm = confirmInput.value;
        const termsAccepted = termsCheckbox.checked;
        
        if (!fullname) {
          showBtnMessage('Full name is required', true);
          fullnameInput.focus();
          return;
        }
        if (!email) {
          showBtnMessage('Email address required', true);
          emailInput.focus();
          return;
        }
        if (!email.includes('@') || !email.includes('.')) {
          showBtnMessage('Enter a valid email', true);
          emailInput.focus();
          return;
        }
        if (!password) {
          showBtnMessage('Please create a password', true);
          passwordInput.focus();
          return;
        }
        if (password.length < 6) {
          showBtnMessage('Password must be at least 6 characters', true);
          passwordInput.focus();
          return;
        }
        if (password !== confirm) {
          showBtnMessage('Passwords do not match', true);
          confirmInput.focus();
          return;
        }
        if (!termsAccepted) {
          showBtnMessage('You must accept Terms & Privacy Policy', true);
          termsCheckbox.focus();
          return;
        }
        
        showBtnMessage('Account created! Redirecting...', false);
        setTimeout(() => {
          alert('🎉 Welcome to GlobalNexus!\nYour account has been created successfully. (Demo experience)');
          form.reset();
        }, 1500);
      });
      
      // Social auth demo
      document.getElementById('googleBtn')?.addEventListener('click', (e) => {
        e.preventDefault();
        alert('🔐 Google Sign-Up: Connect your Google account to GlobalNexus (demo).');
      });
      document.getElementById('linkedinBtn')?.addEventListener('click', (e) => {
        e.preventDefault();
        alert('💼 LinkedIn Sign-Up: Professional network integration for global opportunities.');
      });
      
      // Links demo
      document.getElementById('termsLink')?.addEventListener('click', (e) => {
        e.preventDefault();
        alert('GlobalNexus Terms of Service: Fair use, community guidelines, and data responsibility.');
      });
      document.getElementById('privacyLink')?.addEventListener('click', (e) => {
        e.preventDefault();
        alert('GlobalNexus Privacy Policy: Your data is encrypted and never shared without your consent.');
      });
    
    })();
    // Password toggle
const togglePassword = document.getElementById('togglePassword');
const passwordInput = document.getElementById('password');

togglePassword.addEventListener('click', () => {
  const type = passwordInput.type === 'password' ? 'text' : 'password';
  passwordInput.type = type;
  togglePassword.classList.toggle('fa-eye');
  togglePassword.classList.toggle('fa-eye-slash');
});

// Confirm password toggle
const toggleConfirm = document.getElementById('toggleConfirm');
const confirmInput = document.getElementById('confirm_password');

toggleConfirm.addEventListener('click', () => {
  const type = confirmInput.type === 'password' ? 'text' : 'password';
  confirmInput.type = type;
  toggleConfirm.classList.toggle('fa-eye');
  toggleConfirm.classList.toggle('fa-eye-slash');
});
  </script>
